# Qodo-Embed-1-1.5B — дообученная gte-Qwen2-1.5B-instruct (CoIR ~68.5).
# Их кастомный modeling_qwen.py лезет за config.rope_theta, которого нет в
# загруженном конфиге -> AttributeError. Подставляем rope_theta (дефолт Qwen2)
# через config_kwargs. Малый batch — 1.5B на T4 иначе ловит OOM.
embedding_model: "Qodo/Qodo-Embed-1-1.5B"
embedder_trust_remote_code: true
st_config_kwargs:
  rope_theta: 1000000
enable_reranking: false
device: "cuda"
batch_size: 8
index_dir: "index_qodo_15b"
retrieval_top_k: 100  # пул кандидатов ретривера (для Recall@50/@100)
