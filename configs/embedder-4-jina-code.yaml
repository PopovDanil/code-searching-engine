# jina-embeddings-v2-base-code (161M) — код-специфичный (ALiBi, до 8192 токенов).
# Требует trust_remote_code=True. Дефолтный контекст 8192 при большом batch = OOM на T4,
# поэтому batch маленький; длину карточек и так ограничивает наш chunking.
embedding_model: "jinaai/jina-embeddings-v2-base-code"
embedder_trust_remote_code: true
enable_reranking: false
device: "cuda"
batch_size: 8
index_dir: "index_jina_code"
