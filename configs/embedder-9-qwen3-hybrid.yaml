# Гибрид BM25 + dense (RRF) — идея из CodeRAG.
# Тот же dense-эмбеддер, что baseline (Qwen3-0.6B), плюс лексический BM25;
# два списка кандидатов сливаются через Reciprocal Rank Fusion.
# Сравнивать с embedder-1 (dense-only, тот же эмбеддер).
embedding_model: "Qwen/Qwen3-Embedding-0.6B"
enable_reranking: false
enable_hybrid: true
hybrid_rrf_k: 60
hybrid_dense_weight: 1.0
hybrid_bm25_weight: 1.0
device: "cuda"
embedding_dtype: "float16"
batch_size: 32
index_dir: "index_qwen3_hybrid"
