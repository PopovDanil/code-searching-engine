embedding_model: "Qwen/Qwen3-Embedding-0.6B"
reranker_model: "Qwen/Qwen3-Reranker-0.6B"

batch_size: 4
max_seq_length: 512
num_parser_workers: 2

max_chunk_chars: 1500
chunk_overlap_chars: 150

top_k: 10
retrieval_top_k: 100

index_type: "flat"
index_dir: "index_colab_language_hint"
separate_indexes: false

device: "cuda"
embedding_dtype: "float16"

enable_reranking: true

enable_query_rewriting: false
query_rewrite_strategy: "none"
query_rewriter_model: "Qwen/Qwen2.5-0.5B-Instruct"
query_rewriter_max_new_tokens: 128

reranker_language_hint: true

query_instruction: "Retrieve relevant source code based on the user query"

weights:
  reranker: 0.75
  embedding: 0.20
  metadata: 0.05

